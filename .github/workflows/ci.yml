name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Fallow's audit gate diffs against the base ref; give it full history.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Fallow (dead-code, duplication, security)
        run: npm run lint:fallow

      - name: Unit tests
        run: npm test

  mutation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Mutation tests (Stryker)
        run: npm run test:mutation

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Install Playwright browser
        run: npx --prefix ui playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e
